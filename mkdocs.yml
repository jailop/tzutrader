# TzuTrader Documentation Configuration

# Project information
site_name: TzuTrader Documentation
site_description: A trading bot library for Nim providing tools for building and testing algorithmic trading strategies
site_author: Jaime Lopez
site_url: https://jailop.github.io/tzutrader/

# Repository information
repo_name: tzutrader
repo_url: https://codeberg.org/jailop/tzutrader
edit_uri: edit/main/docs_src/

# Directory configuration
docs_dir: docs_src
site_dir: docs

# Copyright
copyright: Copyright &copy; 2024 DataInquiry Team

# Theme configuration
theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant      # Fast page loading
    - navigation.tracking     # URL updates with scroll
    - navigation.tabs         # Top-level tabs
    - navigation.sections     # Expandable sections
    - navigation.expand       # Expand all sections by default
    - navigation.indexes      # Section index pages
    - navigation.top          # Back to top button
    - search.suggest          # Search suggestions
    - search.highlight        # Highlight search terms
    - content.code.copy       # Copy button for code blocks
    - content.code.annotate   # Code annotations

# Navigation structure
nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user_guide/01_getting_started.md
      - Working with Data: user_guide/02_data.md
      - Technical Indicators: user_guide/03_indicators.md
      - Trading Strategies: user_guide/04_strategies.md
      - Portfolio Management: user_guide/05_portfolio.md
      - Backtesting: user_guide/06_backtesting.md
      - Scanning: user_guide/07_scanning.md
      - Workflows: user_guide/08_workflows.md
      - Best Practices: user_guide/09_best_practices.md
  - Reference Guide:
      - Core Concepts: reference_guide/01_core.md
      - Data Management: reference_guide/02_data.md
      - Technical Indicators: reference_guide/03_indicators.md
      - Trading Strategies: reference_guide/04_strategies.md
      - Mean Reversion Strategies: reference_guide/04a_strategies_mean_reversion.md
      - Trend Following Strategies: reference_guide/04b_strategies_trend.md
      - Hybrid Strategies: reference_guide/04c_strategies_hybrid.md
      - Portfolio Management: reference_guide/05_portfolio.md
      - Backtesting Engine: reference_guide/06_backtesting.md
      - Scanner: reference_guide/07_scanning.md
      - Exports: reference_guide/08_exports.md
      - CLI Tool: reference_guide/09_cli.md
  - API: api/index.html

# Markdown extensions
markdown_extensions:
  # Python Markdown extensions
  - abbr                      # Abbreviations
  - admonition                # Callout blocks
  - attr_list                 # Add HTML attributes
  - def_list                  # Definition lists
  - footnotes                 # Footnote syntax
  - md_in_html                # Markdown in HTML
  - tables                    # Table support
  - toc:                      # Table of contents
      permalink: true
      toc_depth: 3
  
  # PyMdown Extensions
  - pymdownx.arithmatex:      # Math equations
      generic: true
  - pymdownx.betterem:        # Better emphasis
      smart_enable: all
  - pymdownx.caret            # Superscript with ^
  - pymdownx.mark             # Highlighting with ==
  - pymdownx.tilde            # Subscript with ~
  - pymdownx.details          # Collapsible blocks
  - pymdownx.highlight:       # Code highlighting
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite     # Inline code highlighting
  - pymdownx.keys             # Keyboard keys
  - pymdownx.smartsymbols     # Smart symbols
  - pymdownx.snippets         # Include file snippets
  - pymdownx.superfences:     # Advanced code blocks
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:          # Tabbed content
      alternate_style: true
  - pymdownx.tasklist:        # Task lists
      custom_checkbox: true

# Extra JavaScript for MathJax
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Plugins
plugins:
  - search:                   # Search functionality
      lang: en
      separator: '[\s\-\.]+'
  - minify:                   # Minify HTML/CSS/JS
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      js_files:
        - javascripts/mathjax.js
      css_files:
        - stylesheets/extra.css

# Extra configuration
extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/git-alt
      link: https://codeberg.org/jailop/tzutrader
      name: Source Code
