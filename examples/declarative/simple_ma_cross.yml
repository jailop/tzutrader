# Simple Moving Average Crossover for Batch Testing
version: "1.0"

metadata:
  name: "MA Crossover"
  description: "Moving average crossover strategy"
  author: "TzuTrader"
  tags:
    - moving_average
    - trend

indicators:
  - id: sma_fast
    type: sma
    params:
      period: 10
  
  - id: sma_slow
    type: sma
    params:
      period: 30

entry:
  conditions:
    left: sma_fast
    operator: "crosses_above"
    right: sma_slow

exit:
  conditions:
    left: sma_fast
    operator: "crosses_below"
    right: sma_slow

position_sizing:
  type: percent
  percent: 95
