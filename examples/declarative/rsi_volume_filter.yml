# RSI with Volume Confirmation
# RSI oversold/overbought with volume filter

version: "1.0"

metadata:
  name: "RSI with Volume Filter"
  description: "RSI strategy with volume confirmation to reduce false signals"
  author: "TzuTrader"
  tags:
    - rsi
    - volume
    - filtered

indicators:
  - id: rsi_14
    type: rsi
    params:
      period: 14
  
  - id: vol_sma
    type: sma
    params:
      period: 20
    source: volume

entry:
  conditions:
    operator: and
    conditions:
      - left: rsi_14
        operator: "<"
        right: "30"
      - left: volume
        operator: ">"
        right: vol_sma

exit:
  conditions:
    left: rsi_14
    operator: ">"
    right: "70"

position_sizing:
  type: percent
  percent: 80
