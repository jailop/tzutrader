# Simple RSI Strategy for Batch Testing
version: "1.0"

metadata:
  name: "Simple RSI"
  description: "Basic RSI oversold/overbought strategy"
  author: "TzuTrader"
  tags:
    - rsi
    - momentum

indicators:
  - id: rsi_14
    type: rsi
    params:
      period: 14

entry:
  conditions:
    left: rsi_14
    operator: "<"
    right: "30"

exit:
  conditions:
    left: rsi_14
    operator: ">"
    right: "70"

position_sizing:
  type: fixed
  size: 100.0
