# Bollinger Bands Reversal Strategy
# Buys when price touches lower band, sells at upper band

version: "1.0"

metadata:
  name: "Bollinger Bands Reversal"
  description: "Mean reversion strategy using Bollinger Bands"
  author: "TzuTrader"
  tags:
    - bollinger_bands
    - mean_reversion
    - volatility

indicators:
  - id: bb
    type: bollinger
    params:
      period: 20
      std_dev: 2.0

entry:
  conditions:
    left: price.close
    operator: "<"
    right: bb.lower

exit:
  conditions:
    left: price.close
    operator: ">"
    right: bb.upper

position_sizing:
  type: percent
  percent: 90
