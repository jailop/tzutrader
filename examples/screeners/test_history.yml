metadata:
  name: "History Test Screener"
  description: "Test screener for history persistence feature"
  version: "1.0"
  author: "TzuTrader"

strategies:
  - kind: builtin
    name: rsi
    params:
      period: 14
      oversold: 30
      overbought: 70

data:
  source: yahoo
  symbols:
    - AAPL
    - GOOGL
    - MSFT
  lookback: 90d
  interval: 1d

output:
  format: terminal
  detail_level: detailed
  save_history: true
  history_dir: "test_screener_history"

filters:
  signal_types:
    - buy_signal
    - sell_signal
  min_strength: moderate
