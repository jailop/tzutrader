metadata:
  name: "NOT Logic Test Strategy"
  description: "Tests NOT condition support (Phase 3)"
  tags: ["test", "phase3", "not-logic"]

indicators:
  - id: rsi_14
    type: rsi
    params:
      period: 14
  
  - id: sma_200
    type: sma
    params:
      period: 200

# Entry: RSI < 30 AND NOT(price < sma_200)
# Meaning: Oversold but NOT in a downtrend
entry:
  conditions:
    all:
      - left: rsi_14
        operator: "<"
        right: "30"
      - not:
          left: price
          operator: "<"
          right: sma_200

# Exit: RSI > 70
exit:
  conditions:
    left: rsi_14
    operator: ">"
    right: "70"

position_sizing:
  type: percent
  percent: 10
