metadata:
  name: "Indicator-to-Indicator Comparison Test"
  description: "Tests comparing two indicators directly (Phase 3)"
  tags: ["test", "phase3", "indicator-comparison"]

indicators:
  - id: sma_50
    type: sma
    params:
      period: 50
  
  - id: sma_200
    type: sma
    params:
      period: 200
  
  - id: rsi_14
    type: rsi
    params:
      period: 14

# Entry: SMA_50 crosses above SMA_200 (Golden Cross) AND RSI < 60
entry:
  conditions:
    all:
      - left: sma_50
        operator: "crosses_above"
        right: sma_200
      - left: rsi_14
        operator: "<"
        right: "60"

# Exit: SMA_50 crosses below SMA_200 (Death Cross)
exit:
  conditions:
    left: sma_50
    operator: "crosses_below"
    right: sma_200

position_sizing:
  type: percent
  percent: 20
