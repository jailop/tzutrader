metadata:
  name: "Expression Indicator Test"
  description: "Tests custom expression-based indicators (Phase 3)"
  tags: ["test", "phase3", "expression"]

indicators:
  - id: rsi_14
    type: rsi
    params:
      period: 14
  
  - id: rsi_21
    type: rsi
    params:
      period: 21
  
  - id: avg_rsi
    type: expression
    params:
      formula: "(rsi_14 + rsi_21) / 2"
  
  - id: rsi_momentum
    type: expression
    params:
      formula: "rsi_14 - rsi_21"

# Entry: Average RSI < 30 AND momentum is negative
entry:
  conditions:
    all:
      - left: avg_rsi
        operator: "<"
        right: "30"
      - left: rsi_momentum
        operator: "<"
        right: "0"

# Exit: Average RSI > 70
exit:
  conditions:
    left: avg_rsi
    operator: ">"
    right: "70"

position_sizing:
  type: percent
  percent: 15
